name: Main CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TARGET_INFRA: serverless  # Target Infrastructure Strategy Toggle: 'serverless', 'express', 'eks', or 'apprunner'

jobs:
  detect-changes:
    name: Detect Changed Components
    runs-on: ubuntu-latest
    outputs:
      infrastructure: ${{ steps.filter.outputs.infrastructure }}
      catalog: ${{ steps.filter.outputs.catalog }}
      inventory: ${{ steps.filter.outputs.inventory }}
      order: ${{ steps.filter.outputs.order }}
      frontend: ${{ steps.filter.outputs.frontend }}
      payment: ${{ steps.filter.outputs.payment }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Path Filtering
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infrastructure:
              - 'infrastructure/**'
              - '.github/workflows/main-pipeline.yaml'
            catalog:
              - 'backend/catalog-service/**'
            inventory:
              - 'backend/inventory-service/**'
            order:
              - 'backend/order-service/**'
            frontend:
              - 'frontend/**'
            payment:
              - 'backend/payment-service/**'

  cdk-diff:
    name: CDK Diff (PR)
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.infrastructure == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Node Environment Setup
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Ingest AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install Toolchain Dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Execute CDK Diff
        working-directory: infrastructure
        run: npx cdk diff -c targetInfra=${{ env.TARGET_INFRA }}

  cdk-deploy:
    name: CDK Deploy (Push)
    needs: detect-changes
    if: github.event_name == 'push' && needs.detect-changes.outputs.infrastructure == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Node Environment Setup
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Ingest AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install Toolchain Dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Tear Down Inactive Infrastructure Strategy
        working-directory: infrastructure
        run: |
          if [ "${{ env.TARGET_INFRA }}" = "serverless" ]; then
            echo "Tearing down inactive EKS and ECS stacks..."
            npx cdk destroy WinterEksStackV2 --force -c targetInfra=eks || true
            npx cdk destroy WinterEcsExpressStack --force -c targetInfra=express || true
          elif [ "${{ env.TARGET_INFRA }}" = "eks" ]; then
            echo "Tearing down inactive ECS and Serverless stacks..."
            npx cdk destroy WinterEcsExpressStack --force -c targetInfra=express || true
            npx cdk destroy WinterServerlessStack --force -c targetInfra=serverless || true
          else
            echo "Tearing down inactive EKS and Serverless stacks..."
            npx cdk destroy WinterEksStackV2 --force -c targetInfra=eks || true
            npx cdk destroy WinterServerlessStack --force -c targetInfra=serverless || true
          fi

      - name: Execute CDK Deploy
        working-directory: infrastructure
        run: npx cdk deploy --all --require-approval never -c targetInfra=${{ env.TARGET_INFRA }}

      - name: Automate Cloudflare DNS Propagation Hook
        run: |
          if [ "${{ env.TARGET_INFRA }}" = "serverless" ]; then
            API_ID=$(aws apigatewayv2 get-apis --query "Items[?Name=='WinterServerlessApi'].ApiId | [0]" --output text)
            if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
              echo "Error: No API Gateway found with name WinterServerlessApi"
              exit 1
            fi
            TARGET_DNS="${API_ID}.execute-api.us-east-1.amazonaws.com"
          elif [ "${{ env.TARGET_INFRA }}" = "eks" ]; then
            ALB_DNS=$(aws elbv2 describe-load-balancers --query "LoadBalancers[?starts_with(LoadBalancerName, 'k8s-default-frontend-')] | sort_by(@, &CreatedTime) | [-1].DNSName" --output text)
            if [ -z "$ALB_DNS" ] || [ "$ALB_DNS" = "None" ]; then
              echo "Error: No load balancer found starting with k8s-default-frontend-"
              exit 1
            fi
            TARGET_DNS="$ALB_DNS"
          elif [ "${{ env.TARGET_INFRA }}" = "express" ] || [ "${{ env.TARGET_INFRA }}" = "apprunner" ]; then
            ALB_DNS=$(aws elbv2 describe-load-balancers --query "LoadBalancers[?LoadBalancerName=='WinterEcsAlb'].DNSName" --output text)
            if [ -z "$ALB_DNS" ] || [ "$ALB_DNS" = "None" ]; then
              echo "Error: No load balancer found with name WinterEcsAlb"
              exit 1
            fi
            TARGET_DNS="$ALB_DNS"
          else
            echo "Unknown infrastructure target: ${{ env.TARGET_INFRA }}"
            exit 1
          fi
          echo "Found active target DNS: $TARGET_DNS"

          RECORD_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records?name=projects.pranilrathod.dev" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')

          if [ -z "$RECORD_ID" ] || [ "$RECORD_ID" = "null" ]; then
            echo "Error: Could not retrieve DNS record ID for projects.pranilrathod.dev from Cloudflare"
            exit 1
          fi
          echo "Found Cloudflare Record ID: $RECORD_ID"

          UPDATE_RES=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records/$RECORD_ID" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{\"type\":\"CNAME\",\"name\":\"projects.pranilrathod.dev\",\"content\":\"$TARGET_DNS\",\"ttl\":1,\"proxied\":true}")

          if echo "$UPDATE_RES" | grep -q '"success":true'; then
            echo "Cloudflare DNS mapping successfully synchronized to: $TARGET_DNS"
          else
            echo "Error: Cloudflare DNS update failed. Response: $UPDATE_RES"
            exit 1
          fi

      - name: Deploy Monitoring Stack to EKS
        if: env.TARGET_INFRA == 'eks'
        run: |
          aws eks update-kubeconfig --region us-east-1 --name WinterClusterE1A7478C-f496e17ffa8b48c2bc349244d407e9b9
          kubectl apply -f infrastructure/k8s-monitoring/loki-stack.yaml

  deploy-catalog:
    name: Deploy Catalog Service
    needs: [detect-changes, cdk-deploy]
    if: always() && github.event_name == 'push' && needs.detect-changes.outputs.catalog == 'true' && (needs.cdk-deploy.result == 'success' || needs.cdk-deploy.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image
        run: |
          docker build -t 880252974759.dkr.ecr.us-east-1.amazonaws.com/winter-catalog-service:latest ./backend/catalog-service
          docker push 880252974759.dkr.ecr.us-east-1.amazonaws.com/winter-catalog-service:latest

      - name: Update Kubeconfig
        if: env.TARGET_INFRA == 'eks'
        run: |
          aws eks update-kubeconfig --region us-east-1 --name WinterClusterE1A7478C-f496e17ffa8b48c2bc349244d407e9b9

      - name: Deploy Manifests to EKS
        if: env.TARGET_INFRA == 'eks'
        run: |
          kubectl apply -f backend/catalog-service/k8s/deployment.yaml
          kubectl apply -f frontend/k8s/ingress.yaml
          kubectl rollout restart deployment/catalog-service-deployment

      - name: Deploy to ECS Express
        if: env.TARGET_INFRA == 'express' || env.TARGET_INFRA == 'apprunner'
        run: |
          aws ecs update-service --cluster WinterEcsCluster --service winter-catalog-service --force-new-deployment

      - name: Deploy to Serverless Lambda
        if: env.TARGET_INFRA == 'serverless'
        run: |
          LAMBDA_ARN=$(aws lambda list-functions --query "Functions[?starts_with(FunctionName, 'WinterServerlessStack-CatalogLambda')].FunctionName | [0]" --output text)
          if [ -n "$LAMBDA_ARN" ] && [ "$LAMBDA_ARN" != "None" ]; then
            aws lambda update-function-code --function-name "$LAMBDA_ARN" --image-uri 880252974759.dkr.ecr.us-east-1.amazonaws.com/winter-catalog-service:latest
          fi

  deploy-order:
    name: Deploy Order Service
    needs: [detect-changes, cdk-deploy]
    if: always() && github.event_name == 'push' && needs.detect-changes.outputs.order == 'true' && (needs.cdk-deploy.result == 'success' || needs.cdk-deploy.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image
        run: |
          docker build -t 880252974759.dkr.ecr.us-east-1.amazonaws.com/winter-order-service:latest ./backend/order-service
          docker push 880252974759.dkr.ecr.us-east-1.amazonaws.com/winter-order-service:latest

      - name: Update Kubeconfig
        if: env.TARGET_INFRA == 'eks'
        run: |
          aws eks update-kubeconfig --region us-east-1 --name WinterClusterE1A7478C-f496e17ffa8b48c2bc349244d407e9b9

      - name: Deploy Manifests to EKS
        if: env.TARGET_INFRA == 'eks'
        run: |
          kubectl apply -f backend/order-service/k8s/deployment.yaml
          kubectl rollout restart deployment/order-service-deployment

      - name: Deploy to ECS Express
        if: env.TARGET_INFRA == 'express' || env.TARGET_INFRA == 'apprunner'
        run: |
          aws ecs update-service --cluster WinterEcsCluster --service winter-order-service --force-new-deployment

      - name: Deploy to Serverless Lambda
        if: env.TARGET_INFRA == 'serverless'
        run: |
          LAMBDA_ARN=$(aws lambda list-functions --query "Functions[?starts_with(FunctionName, 'WinterServerlessStack-OrderLambda')].FunctionName | [0]" --output text)
          if [ -n "$LAMBDA_ARN" ] && [ "$LAMBDA_ARN" != "None" ]; then
            aws lambda update-function-code --function-name "$LAMBDA_ARN" --image-uri 880252974759.dkr.ecr.us-east-1.amazonaws.com/winter-order-service:latest
          fi

  deploy-inventory:
    name: Deploy Inventory Service
    needs: [detect-changes, cdk-deploy]
    if: always() && github.event_name == 'push' && needs.detect-changes.outputs.inventory == 'true' && (needs.cdk-deploy.result == 'success' || needs.cdk-deploy.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'backend/inventory-service/package-lock.json'

      - name: Cache dependencies and run compile check
        run: |
          cd backend/inventory-service
          npm ci
          npm run build

      - name: Build, Tag, and Push Docker Image
        run: |
          docker build -t 880252974759.dkr.ecr.us-east-1.amazonaws.com/winter-inventory-service:latest ./backend/inventory-service
          docker push 880252974759.dkr.ecr.us-east-1.amazonaws.com/winter-inventory-service:latest

      - name: Update Kubeconfig
        if: env.TARGET_INFRA == 'eks'
        run: |
          aws eks update-kubeconfig --region us-east-1 --name WinterClusterE1A7478C-f496e17ffa8b48c2bc349244d407e9b9

      - name: Deploy Manifests to EKS & Track Rollout
        if: env.TARGET_INFRA == 'eks'
        run: |
          kubectl apply -f backend/inventory-service/k8s/deployment.yaml
          kubectl rollout restart deployment/inventory-service-deployment
          kubectl rollout status deployment/inventory-service-deployment --timeout=120s

      - name: Deploy to ECS Express
        if: env.TARGET_INFRA == 'express' || env.TARGET_INFRA == 'apprunner'
        run: |
          aws ecs update-service --cluster WinterEcsCluster --service winter-inventory-service --force-new-deployment

      - name: Deploy to Serverless Lambda
        if: env.TARGET_INFRA == 'serverless'
        run: |
          LAMBDA_ARN=$(aws lambda list-functions --query "Functions[?starts_with(FunctionName, 'WinterServerlessStack-InventoryLambda')].FunctionName | [0]" --output text)
          if [ -n "$LAMBDA_ARN" ] && [ "$LAMBDA_ARN" != "None" ]; then
            aws lambda update-function-code --function-name "$LAMBDA_ARN" --image-uri 880252974759.dkr.ecr.us-east-1.amazonaws.com/winter-inventory-service:latest
          fi

  deploy-frontend:
    name: Deploy Frontend BFF
    needs: [detect-changes, cdk-deploy]
    if: always() && github.event_name == 'push' && needs.detect-changes.outputs.frontend == 'true' && (needs.cdk-deploy.result == 'success' || needs.cdk-deploy.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image
        run: |
          docker build -t 880252974759.dkr.ecr.us-east-1.amazonaws.com/winter-frontend-bff:latest ./frontend
          docker push 880252974759.dkr.ecr.us-east-1.amazonaws.com/winter-frontend-bff:latest

      - name: Update Kubeconfig
        if: env.TARGET_INFRA == 'eks'
        run: |
          aws eks update-kubeconfig --region us-east-1 --name WinterClusterE1A7478C-f496e17ffa8b48c2bc349244d407e9b9

      - name: Deploy Manifests to EKS
        if: env.TARGET_INFRA == 'eks'
        run: |
          kubectl apply -f frontend/k8s/deployment.yaml
          kubectl apply -f frontend/k8s/ingress.yaml
          kubectl rollout restart deployment/frontend-deployment

      - name: Deploy to ECS Express
        if: env.TARGET_INFRA == 'express' || env.TARGET_INFRA == 'apprunner'
        run: |
          aws ecs update-service --cluster WinterEcsCluster --service winter-frontend-bff --force-new-deployment

      - name: Deploy to Serverless Lambda
        if: env.TARGET_INFRA == 'serverless'
        run: |
          LAMBDA_ARN=$(aws lambda list-functions --query "Functions[?starts_with(FunctionName, 'WinterServerlessStack-FrontendLambda')].FunctionName | [0]" --output text)
          if [ -n "$LAMBDA_ARN" ] && [ "$LAMBDA_ARN" != "None" ]; then
            aws lambda update-function-code --function-name "$LAMBDA_ARN" --image-uri 880252974759.dkr.ecr.us-east-1.amazonaws.com/winter-frontend-bff:latest
          fi

  deploy-payment:
    name: Deploy Payment Service
    needs: [detect-changes, cdk-deploy]
    if: always() && github.event_name == 'push' && needs.detect-changes.outputs.payment == 'true' && (needs.cdk-deploy.result == 'success' || needs.cdk-deploy.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'backend/payment-service/package-lock.json'

      - name: Cache dependencies and run compile check
        run: |
          cd backend/payment-service
          npm ci
          npm run build

      - name: Build, Tag, and Push Docker Image
        run: |
          docker build -t 880252974759.dkr.ecr.us-east-1.amazonaws.com/winter-payment-service:latest ./backend/payment-service
          docker push 880252974759.dkr.ecr.us-east-1.amazonaws.com/winter-payment-service:latest

      - name: Update Kubeconfig
        if: env.TARGET_INFRA == 'eks'
        run: |
          aws eks update-kubeconfig --region us-east-1 --name WinterClusterE1A7478C-f496e17ffa8b48c2bc349244d407e9b9

      - name: Deploy Manifests to EKS & Track Rollout
        if: env.TARGET_INFRA == 'eks'
        run: |
          kubectl apply -f backend/payment-service/k8s/deployment.yaml
          kubectl rollout restart deployment/payment-service-deployment
          kubectl rollout status deployment/payment-service-deployment --timeout=120s

      - name: Deploy to ECS Express
        if: env.TARGET_INFRA == 'express' || env.TARGET_INFRA == 'apprunner'
        run: |
          aws ecs update-service --cluster WinterEcsCluster --service winter-payment-service --force-new-deployment

      - name: Deploy to Serverless Lambda
        if: env.TARGET_INFRA == 'serverless'
        run: |
          LAMBDA_ARN=$(aws lambda list-functions --query "Functions[?starts_with(FunctionName, 'WinterServerlessStack-PaymentLambda')].FunctionName | [0]" --output text)
          if [ -n "$LAMBDA_ARN" ] && [ "$LAMBDA_ARN" != "None" ]; then
            aws lambda update-function-code --function-name "$LAMBDA_ARN" --image-uri 880252974759.dkr.ecr.us-east-1.amazonaws.com/winter-payment-service:latest
          fi
