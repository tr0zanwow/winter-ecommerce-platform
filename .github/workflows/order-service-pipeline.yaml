name: Order Service CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'backend/order-service/**'

jobs:
  build-and-deploy:
    name: Build & Deploy Order Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image
        run: |
          docker build -t 880252974759.dkr.ecr.us-east-1.amazonaws.com/winter-order-service:latest ./backend/order-service
          docker push 880252974759.dkr.ecr.us-east-1.amazonaws.com/winter-order-service:latest

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --region us-east-1 --name WinterClusterE1A7478C-5bf7dcc0943642d3996ad81e136570a4

      - name: Deploy Manifests to EKS
        run: |
          kubectl apply -f backend/order-service/k8s/deployment.yaml
