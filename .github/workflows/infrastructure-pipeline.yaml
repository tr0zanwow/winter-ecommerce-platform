name: Infrastructure CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
    paths:
      - 'infrastructure/**'
  push:
    branches:
      - main
    paths:
      - 'infrastructure/**'

jobs:
  cdk_orchestration:
    name: CDK Orchestration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Node Environment Setup
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ingest AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install Toolchain Dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Execute CDK Diff (Phase A)
        if: github.event_name == 'pull_request'
        working-directory: infrastructure
        run: npx cdk diff

      - name: Execute CDK Deploy (Phase B)
        if: github.ref == 'refs/heads/main'
        working-directory: infrastructure
        run: npx cdk deploy --all --require-approval never

      - name: Automate Cloudflare DNS Propagation Hook
        if: github.ref == 'refs/heads/main'
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers --query "LoadBalancers[?starts_with(LoadBalancerName, 'k8s-default-frontend-')] | sort_by(@, &CreatedTime) | [-1].DNSName" --output text)
          if [ -z "$ALB_DNS" ] || [ "$ALB_DNS" = "None" ]; then
            echo "Error: No load balancer found starting with k8s-default-frontend-"
            exit 1
          fi
          echo "Found active ALB DNS: $ALB_DNS"

          RECORD_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records?name=projects.pranilrathod.dev" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')

          if [ -z "$RECORD_ID" ] || [ "$RECORD_ID" = "null" ]; then
            echo "Error: Could not retrieve DNS record ID for projects.pranilrathod.dev from Cloudflare"
            exit 1
          fi
          echo "Found Cloudflare Record ID: $RECORD_ID"

          UPDATE_RES=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records/$RECORD_ID" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{\"type\":\"CNAME\",\"name\":\"projects.pranilrathod.dev\",\"content\":\"$ALB_DNS\",\"ttl\":1,\"proxied\":false}")

          if echo "$UPDATE_RES" | grep -q '"success":true'; then
            echo "Cloudflare DNS mapping successfully synchronized to: $ALB_DNS"
          else
            echo "Error: Cloudflare DNS update failed. Response: $UPDATE_RES"
            exit 1
          fi
