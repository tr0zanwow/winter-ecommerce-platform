apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-bff-deployment
  namespace: default
  labels:
    app: frontend-bff
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-bff
  template:
    metadata:
      labels:
        app: frontend-bff
    spec:
      containers:
      - name: frontend-bff
        image: 880252974759.dkr.ecr.us-east-1.amazonaws.com/winter-frontend-bff:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "100Mi"
            cpu: "50m"
          limits:
            memory: "150Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-bff-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: frontend-bff
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
