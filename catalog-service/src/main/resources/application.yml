spring:
  application:
    name: catalog-service
  
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:catalog_db}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      pool-name: CatalogServiceHikariCP

server:
  port: 8080
