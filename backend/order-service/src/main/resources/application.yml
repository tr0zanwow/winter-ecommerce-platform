server:
  port: 8081
  tomcat:
    threads:
      max: 200 # Overridden by Virtual Threads optimization below

spring:
  application:
    name: order-service
  threads:
    virtual:
      enabled: true # ENFORCES PLATFORM-WIDE PROJECT LOOM CONCURRENCY

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:winter_orders}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health
