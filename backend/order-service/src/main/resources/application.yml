server:
  port: 8081
  servlet:
    context-path: /winter
  tomcat:
    threads:
      max: 200 # Overridden by Virtual Threads optimization

spring:
  application:
    name: order-service
  threads:
    virtual:
      enabled: true

  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        instance-profile: false


  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:winter_orders}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health
